name: gpu-nightly

# The main `ci` workflow runs on GPU-less ubuntu-latest, where the webgpu
# vitest project auto-skips — so every GPU correctness gate (compiled-vs-
# lowered trajectory parity, stream-generation diff, stream determinism,
# the loss-regression and fused-vs-elementwise differentials) runs ONLY
# here. Without this job those gates are manual-only and rot silently
# (2026-06-13 audit, task #44).
#
# REQUIRES a self-hosted runner labelled [self-hosted, gpu] with WebGPU/Dawn
# available (the dw-2-1 / sivri boxes). Register one, or trigger manually.
# The runner also needs `xvfb` + a Playwright Chromium (the box ships both) for
# the browser project: vitest browser mode launches a HEADED Chromium, so it
# runs under xvfb-run. The browser project is the ONLY in-browser training
# validation (test/browser/lora-training-trajectory.spec.ts) and is what guards
# the compiled-harvest view-base storage-handle leak class (commit 867f6c1).
# It's excluded from `npm test` (needs a display) so it executes ONLY here.

on:
  schedule:
    - cron: "0 7 * * *" # nightly 07:00 UTC
  workflow_dispatch: {}

concurrency:
  group: gpu-nightly
  cancel-in-progress: true

jobs:
  gpu-gates:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Full suite incl. the slow project. On a GPU runner canUseWebGPU() is
      # true, so the webgpu project — and the compiled-plan-parity gates
      # (compiled==lowered, stream-gen no-divergence, determinism) — execute.
      - run: pnpm test:full
      # Browser project (real Chromium WebGPU via Playwright): the in-browser
      # LoRA training-trajectory test (loss descends + GPU storage flat — the
      # compiled-harvest leak guard). Ensure Chromium is present, then run the
      # headed browser under a virtual display.
      - run: pnpm exec playwright install chromium
      - run: xvfb-run -a pnpm test:browser
